<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>DeskConcierge</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            max-width: 760px;
            margin: 2.5rem auto;
            padding: 0 1.25rem;
            line-height: 1.5;
        }
        h1 { margin-bottom: 0.25rem; }
        .sub { color: #888; margin-top: 0; }
        form {
            display: flex;
            gap: 0.75rem;
            align-items: center;
            margin: 1.5rem 0;
            padding: 1rem;
            border: 1px solid #ccc4;
            border-radius: 10px;
        }
        button {
            padding: 0.5rem 1rem;
            border-radius: 8px;
            border: 1px solid #8884;
            cursor: pointer;
        }
        #status { margin: 0.5rem 0 1.5rem; min-height: 1.4rem; color: #888; }
        .doc {
            border: 1px solid #ccc4;
            border-radius: 10px;
            padding: 0.9rem 1.1rem;
            margin-bottom: 0.9rem;
        }
        .doc .name {
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .doc .meta {
            font-size: 0.85rem;
            color: #888;
            margin-top: 0.15rem;
        }
        .badge {
            display: inline-block;
            padding: 0.05rem 0.45rem;
            border-radius: 999px;
            border: 1px solid #8884;
            font-size: 0.8rem;
        }
        .badge .badge-key {
            color: #888;
            font-weight: 600;
            margin-right: 0.35rem;
        }
        .badge .badge-val { font-variant-numeric: tabular-nums; }
        .badge.action { border-color: #c5503fcc; color: #d9684f; }
        .badge.termin { border-style: dashed; }
        .doc .sender { font-size: 0.9rem; color: #aaa; margin-top: 0.15rem; }
        .doc .summary { margin-top: 0.5rem; }
        .doc .termine { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .doc .fields { margin-top: 0.5rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
        .doc .ocr { margin-top: 0.65rem; white-space: pre-wrap; }
        .empty { color: #888; font-style: italic; }
    </style>
</head>
<body>
    <h1>DeskConcierge</h1>
    <p class="sub">Haushaltspost hochladen, lesen lassen, wiederfinden.</p>

    <form id="upload-form">
        <input type="file" id="file-input" accept="image/*" required>
        <button type="submit">Hochladen</button>
    </form>

    <div id="status"></div>

    <h2>Dokumente</h2>
    <div id="list"></div>

    <script>
        const statusEl = document.getElementById("status");
        const listEl = document.getElementById("list");

        function displayName(path) {
            const base = path.split(/[\\/]/).pop();
            // old inbox files are "<guid>_<original>"; archive files keep their sprechenden name
            const m = base.match(/^[0-9a-f]{32}_(.+)$/i);
            return m ? m[1] : base;
        }

        function confidence(value) {
            return value == null ? "–" : Math.round(value) + "%";
        }

        function formatIban(value) {
            // group into blocks of four for readability
            return value.replace(/(.{4})/g, "$1 ").trim();
        }

        function fieldBadges(d) {
            const found = [];
            if (d.iban) found.push(["IBAN", formatIban(d.iban)]);
            if (d.date) found.push(["Datum", d.date]);
            if (d.amount) found.push(["Betrag", d.amount + " €"]);
            if (d.invoiceNumber) found.push(["Rg.-Nr.", d.invoiceNumber]);
            return found.map(([key, val]) =>
                `<span class="badge"><span class="badge-key">${key}</span><span class="badge-val">${escapeHtml(val)}</span></span>`
            ).join(" ");
        }

        function termineBadges(d) {
            if (!d.appointments || d.appointments.length === 0) return "";
            const items = d.appointments.map(t =>
                `<span class="badge termin">📅 ${escapeHtml(t.date)}${t.subject ? " — " + escapeHtml(t.subject) : ""}</span>`
            ).join(" ");
            return `<div class="termine">${items}</div>`;
        }

        function escapeHtml(text) {
            const div = document.createElement("div");
            div.textContent = text;
            return div.innerHTML;
        }

        async function loadList() {
            const response = await fetch("/api/documents");
            const documents = await response.json();

            if (documents.length === 0) {
                listEl.innerHTML = '<p class="empty">Noch nichts hochgeladen.</p>';
                return;
            }

            listEl.innerHTML = documents.map(d => `
                <div class="doc">
                    <div class="name">${escapeHtml(displayName(d.originalPath))}</div>
                    <div class="meta">
                        ${new Date(d.createdAt).toLocaleString("de-DE")}
                        &nbsp;·&nbsp; <span class="badge">OCR ${confidence(d.ocrConfidence)}</span>
                        ${d.documentType ? `<span class="badge">${escapeHtml(d.documentType)}</span>` : ""}
                        ${d.actionRequired ? `<span class="badge action">⚠ Handlungsbedarf</span>` : ""}
                    </div>
                    ${d.sender ? `<div class="sender">Absender: ${escapeHtml(d.sender)}</div>` : ""}
                    ${d.summary ? `<div class="summary">${escapeHtml(d.summary)}</div>` : ""}
                    ${termineBadges(d)}
                    <div class="fields">${fieldBadges(d)}</div>
                    <div class="ocr">${d.ocrPreview ? escapeHtml(d.ocrPreview) : '<span class="empty">kein Text erkannt</span>'}</div>
                </div>
            `).join("");
        }

        document.getElementById("upload-form").addEventListener("submit", async (event) => {
            event.preventDefault();
            const input = document.getElementById("file-input");
            if (!input.files.length) return;

            const data = new FormData();
            data.append("file", input.files[0]);

            statusEl.textContent = "Wird verarbeitet …";
            const response = await fetch("/api/documents", { method: "POST", body: data });

            if (response.status === 201) {
                statusEl.textContent = "Hinzugefügt.";
            } else if (response.status === 409) {
                statusEl.textContent = "Schon vorhanden – Duplikat erkannt.";
            } else {
                statusEl.textContent = "Fehler beim Upload (" + response.status + ").";
            }

            input.value = "";
            await loadList();
        });

        loadList();
    </script>
</body>
</html>
